<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digitale Einladung</title>

<script type="text/javascript" src="https://ff.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=BgYH8cZRWQIYyCkHbLnqg7j0wmMGImqDYToGQulZFmR9rLstINv_q6ZI4XAK1nu6BoC7pfuNh0hZNHiU-oEYzPqkiCXK4A9Cp87LTTiAWn7fhTZOccfNVPcA8WpNeE2mOqz12h1WrIrexqvvIPiD_5_Yuq7C5MN2lG6137MLVuH_MX9eSCa6c_34_pvojmrFmX76e3BPtI_WIMS7IesCVzy_NAyY2jCoUCBCuAB9trTXC-jM4mgpv_27rd7M4uP5dVuA9xh2hiWyOvIcMa4OMA" charset="UTF-8"></script><style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

/* Startbildschirm */

.startscreen{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:100;
    transition:opacity 0.8s ease, visibility 0.8s ease;
}

.startscreen.hidden{
    opacity:0;
    visibility:hidden;
}

.startbutton{
    font-size:30px;
    padding:22px 42px;
    border:none;
    border-radius:999px;
    background:white;
    color:#111;
    cursor:pointer;
    box-shadow:0 10px 40px rgba(255,255,255,0.25);
}

.starttext{
    margin-top:24px;
    color:white;
    font-size:18px;
    opacity:0.75;
}

/* Bühne */

.stage{
    position:relative;
    width:95vw;
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:3000px;
}

/* Karte */

.card{
    position:relative;
    width:min(420px,90vw);
    height:min(760px,86vh);
    transition:width 1.2s ease;
    transform-style:preserve-3d;
}

.card.open{
    width:min(840px,95vw);
}

/* Innenseiten */

.inside{
    position:absolute;
    inset:0;
    display:flex;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,0.55);
    opacity:0;
    transform:scaleX(0.5);
    transform-origin:left center;
    transition:
        opacity 0.4s ease 0.45s,
        transform 1.2s ease;
}

.card.open .inside{
    opacity:1;
    transform:scaleX(1);
}

.page{
    width:50%;
    height:100%;
    overflow:hidden;
    background:white;
}

.page img{
    width:100%;
    height:100%;
    object-fit:contain;
    background:white;
}

/* Deckblatt */

.cover{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    z-index:20;
    transform-origin:left center;
    transform-style:preserve-3d;
    transition:
        transform 1.8s cubic-bezier(.25,.8,.25,1),
        opacity 0.15s linear 1.15s,
        visibility 0s linear 1.35s;
    cursor:pointer;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,0.75);
    background:#222;
    backface-visibility:hidden;
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
}

.card.open .cover{
    transform:rotateY(-105deg);
    opacity:0;
    visibility:hidden;
    pointer-events:none;
}

/* Beim Zurückblättern wieder sauber einblenden */
.card:not(.open) .cover{
    opacity:1;
    visibility:visible;
    transition:
        transform 1.8s cubic-bezier(.25,.8,.25,1),
        opacity 0.25s linear 0s,
        visibility 0s linear 0s;
}

/* Schatten */

.fold-shadow{
    position:absolute;
    left:50%;
    top:0;
    width:30px;
    height:100%;
    background:linear-gradient(to right, rgba(0,0,0,0.25), rgba(0,0,0,0));
    opacity:0;
    z-index:10;
    transition:opacity 0.8s ease 0.8s;
    pointer-events:none;
}

.card.open .fold-shadow{
    opacity:1;
}

/* Buttons */

.actionbar{
    position:absolute;
    bottom:15px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:16px;
    z-index:60;
}

.actionbutton{
    border:none;
    border-radius:999px;
    padding:12px 24px;
    font-size:16px;
    cursor:pointer;
    background:white;
    color:#111;
    box-shadow:0 6px 20px rgba(0,0,0,0.3);
    display:none;
}

.actionbutton.visible{
    display:block;
}

/* Hinweis */

.hint{
    position:absolute;
    bottom:80px;
    left:0;
    right:0;
    text-align:center;
    color:white;
    font-size:22px;
    animation:pulse 2s infinite;
    z-index:50;
    display:none;
}

.hint.visible{
    display:block;
}

@keyframes pulse{
    0%{opacity:0.35;}
    50%{opacity:1;}
    100%{opacity:0.35;}
}

/* Smartphone */

@media(max-width:700px){

    .card{
        width:86vw;
        height:82vh;
    }

    .card.open{
        width:96vw;
        height:82vh;
    }

    .hint{
        font-size:18px;
        bottom:72px;
    }

    .startbutton{
        font-size:24px;
        padding:18px 32px;
    }

    .actionbutton{
        font-size:14px;
        padding:10px 18px;
    }
}

</style>
</head>

<body>

<div class="startscreen" id="startscreen">
    <button class="startbutton" id="startbutton">Einladung öffnen</button>
    <div class="starttext">Musik startet nach dem Tippen</div>
</div>

<div class="stage">

    <div class="card" id="card">

        <div class="inside">
            <div class="page">
                <img src="inside-left.jpg">
            </div>

            <div class="page">
                <img src="inside-right.jpg">
            </div>
        </div>

        <div class="fold-shadow"></div>

        <div class="cover" id="cover">
            <img src="cover.jpg">
        </div>

    </div>

    <div class="hint visible" id="hint">
        Zum Aufklappen tippen
    </div>

    <div class="actionbar">
        <button class="actionbutton" id="closebutton">
            ⬅ Zurück zum Deckblatt
        </button>
    </div>

</div>

<audio id="music" loop>
    <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>

const startscreen = document.getElementById('startscreen');
const startbutton = document.getElementById('startbutton');

const card = document.getElementById('card');
const cover = document.getElementById('cover');

const closebutton = document.getElementById('closebutton');
const hint = document.getElementById('hint');
const music = document.getElementById('music');

let started = false;
let opened = false;

startbutton.addEventListener('click', () => {

    if(started) return;

    started = true;

    startscreen.classList.add('hidden');

    hint.classList.add('visible');

    music.play().catch(() => {});

});

cover.addEventListener('click', () => {

    if(!started || opened) return;

    opened = true;

    card.classList.add('open');

    hint.classList.remove('visible');

    closebutton.classList.add('visible');

});

closebutton.addEventListener('click', () => {

    opened = false;

    card.classList.remove('open');

    closebutton.classList.remove('visible');

    hint.classList.add('visible');

});

</script>

</body>
</html>
