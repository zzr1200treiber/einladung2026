<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitale Einladung</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #111;
            min-height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .startscreen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .startbutton {
            font-size: 28px;
            padding: 20px 38px;
            border: none;
            border-radius: 999px;
            background: white;
            color: #111;
            cursor: pointer;
        }

        .starttext {
            margin-top: 22px;
            color: white;
            font-size: 17px;
            opacity: 0.8;
            text-align: center;
            padding: 0 20px;
        }

        .stage {
            width: 100vw;
            height: 100vh;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 14px;
        }

        .cover-view {
            width: min(430px, 92vw);
            height: min(760px, 88vh);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .cover-view img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #111;
        }

        .inside-view {
            width: min(900px, 96vw);
            height: min(760px, 88vh);
            display: none;
            background: white;
        }

        .page {
            width: 50%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: white;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: white;
        }

        .backbutton {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            border: none;
            border-radius: 999px;
            padding: 12px 22px;
            font-size: 15px;
            background: white;
            color: #111;
            cursor: pointer;
            display: none;
        }

        .hint {
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            color: white;
            text-align: center;
            font-size: 18px;
            display: none;
        }

        @media (max-width: 700px) {
            .startbutton {
                font-size: 23px;
                padding: 17px 30px;
            }

            .starttext {
                font-size: 15px;
            }

            .inside-view {
                width: 96vw;
                height: 82vh;
            }

            .cover-view {
                width: 88vw;
                height: 82vh;
            }

            .hint {
                font-size: 16px;
                bottom: 64px;
            }

            .backbutton {
                font-size: 14px;
                padding: 10px 18px;
            }
        }
    </style>
</head>

<body>

    <div class="startscreen" id="startscreen">
        <button class="startbutton" id="startbutton">Einladung öffnen</button>
        <div class="starttext">Bitte tippen – danach startet die Einladung</div>
    </div>

    <div class="stage" id="stage">

        <div class="cover-view" id="coverView">
            <img src="./cover.jpg" alt="Deckblatt">
        </div>

        <div class="inside-view" id="insideView">
            <div class="page">
                <img src="./inside-left.jpg" alt="Innenseite links">
            </div>

            <div class="page">
                <img src="./inside-right.jpg" alt="Innenseite rechts">
            </div>
        </div>

    </div>

    <div class="hint" id="hint">Zum Anzeigen der Innenseiten tippen</div>

    <button class="backbutton" id="backbutton">⬅ Zurück zum Deckblatt</button>

    <script>
        const startscreen = document.getElementById('startscreen');
        const startbutton = document.getElementById('startbutton');
        const stage = document.getElementById('stage');
        const coverView = document.getElementById('coverView');
        const insideView = document.getElementById('insideView');
        const hint = document.getElementById('hint');
        const backbutton = document.getElementById('backbutton');

        let started = false;
        let insideShown = false;
        let music = null;

        startbutton.addEventListener('click', () => {
            if (started) return;

            started = true;

            startscreen.style.display = 'none';
            stage.style.display = 'flex';
            coverView.style.display = 'flex';
            insideView.style.display = 'none';
            hint.style.display = 'block';

            music = new Audio('./musik.mp3');
            music.loop = true;
            music.play().catch(() => {
                /* Falls ein Browser Audio blockiert, bleibt die Einladung trotzdem nutzbar. */
            });
        });

        coverView.addEventListener('click', () => {
            if (!started || insideShown) return;

            insideShown = true;

            coverView.style.display = 'none';
            insideView.style.display = 'flex';
            hint.style.display = 'none';
            backbutton.style.display = 'block';

            if (music && music.paused) {
                music.play().catch(() => {});
            }
        });

        backbutton.addEventListener('click', () => {
            insideShown = false;

            insideView.style.display = 'none';
            coverView.style.display = 'flex';
            backbutton.style.display = 'none';
            hint.style.display = 'block';
        });
    </script>

</body>
</html>
